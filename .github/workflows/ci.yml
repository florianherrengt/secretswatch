name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    if: github.event_name == 'push' || !github.event.pull_request.draft
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17.2-alpine
        env:
          POSTGRES_DB: secret_detector
          POSTGRES_USER: secret_detector
          POSTGRES_PASSWORD: secret_detector
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secret_detector -d secret_detector"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://secret_detector:secret_detector@localhost:5432/secret_detector
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Lint
        run: npm run lint

      - name: Design system enforcement
        run: npm run lint:design-system-enforcement

      - name: Check prettier on changed files
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --deepen=50
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if [ -n "$CHANGED_FILES" ]; then
            echo "$CHANGED_FILES" | xargs npx prettier --check || {
              echo "::error::Prettier check failed. Run 'npm run format' locally and commit the changes."
              exit 1
            }
          fi

      - name: Test
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: ci

    services:
      postgres:
        image: postgres:17.2-alpine
        env:
          POSTGRES_DB: secret_detector
          POSTGRES_USER: secret_detector
          POSTGRES_PASSWORD: secret_detector
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secret_detector -d secret_detector"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://secret_detector:secret_detector@localhost:5432/secret_detector
      REDIS_URL: redis://localhost:6379
      ADMIN_BASIC_AUTH_USERNAME: admin
      ADMIN_BASIC_AUTH_PASSWORD: changeme
      DEBUG_ENDPOINT: true
      RESEND_API_KEY: ''
      RATE_LIMIT_DISABLED: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run database migrations
        run: npm run db:migrate

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
