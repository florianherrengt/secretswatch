name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: secret_detector
          POSTGRES_USER: secret_detector
          POSTGRES_PASSWORD: secret_detector
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secret_detector -d secret_detector"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://secret_detector:secret_detector@localhost:5432/secret_detector
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Design system enforcement
        run: npm run lint:design-system-enforcement

      - name: Test
        run: npm test
