services:
  postgres:
    image: postgres:17.2-alpine
    container_name: secret-detector-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: secret_detector
      POSTGRES_USER: secret_detector
      POSTGRES_PASSWORD: secret_detector
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U secret_detector -d secret_detector']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: secret-detector-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
