services:
  postgres:
    image: postgres:17.2-alpine
    container_name: secrets-watch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: secrets_watch
      POSTGRES_USER: secrets_watch
      POSTGRES_PASSWORD: secrets_watch
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U secrets_watch -d secrets_watch']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: secrets-watch-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
